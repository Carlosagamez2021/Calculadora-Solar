<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sistema Fotovoltaico</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .solar-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .calculate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .calculate-btn:active {
            transform: translateY(-1px);
        }

        .result {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s ease;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-amount {
            font-size: 32px;
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }



        .unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="solar-icon">☀️</div>
            <h1>Calculadora Solar</h1>
            <p>Estima el costo de tu sistema fotovoltaico</p>
        </div>

        <div class="input-group">
            <label for="consumo">Consumo de Energía (kWh)</label>
            <input type="number" id="consumo" placeholder="Ingresa tu consumo mensual en kWh" min="0" step="0.1">
        </div>

        <button class="calculate-btn" onclick="calcular()">
            🔍 Calcular Costo del Sistema
        </button>

        <div id="resultado" class="result">
            <div>💰 Costo estimado del sistema:</div>
            <div class="result-amount" id="monto">$0</div>
            <div class="unit">Pesos colombianos</div>
        </div>


    </div>

    <script>
        function calcular() {
            const consumoInput = document.getElementById('consumo');
            const resultado = document.getElementById('resultado');
            const montoElement = document.getElementById('monto');
            
            const consumo = parseFloat(consumoInput.value);
            
            if (!consumo || consumo <= 0) {
                alert('⚠️ Por favor ingresa un valor válido para el consumo de energía');
                consumoInput.focus();
                return;
            }
            
            // Aplicar la fórmula: (consumo * 1.25) / 30 / 5.5 * 4,200,000
            const paso1 = consumo * 1.25;
            const paso2 = paso1 / 30;
            const paso3 = paso2 / 5.5;
            const costoFinal = paso3 * 4200000;
            
            // Formatear el resultado
            const costoFormateado = new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(costoFinal);
            
            montoElement.textContent = costoFormateado;
            resultado.classList.add('show');
            
            // Agregar animación de éxito
            consumoInput.style.borderColor = '#28a745';
            setTimeout(() => {
                consumoInput.style.borderColor = '#e1e5e9';
            }, 2000);
        }
        
        // Permitir cálculo con Enter
        document.getElementById('consumo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcular();
            }
        });
        
        // Ocultar resultado cuando se cambia el input
        document.getElementById('consumo').addEventListener('input', function() {
            document.getElementById('resultado').classList.remove('show');
        });
    </script>
</body>
</html>
